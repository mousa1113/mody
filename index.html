<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Moka & Malouka — 17</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,600&display=swap" rel="stylesheet"/>
<style>
  /* ═══════════════════════════════════════════════════
     ROOT VARIABLES
  ═══════════════════════════════════════════════════ */
  :root {
    --blush:    #fce4ec;
    --petal:    #f8bbd0;
    --rose:     #f48fb1;
    --deep:     #e91e63;
    --soft:     #fff0f5;
    --ink:      #3a1a28;
    --mist:     #fdf2f6;
    --gold:     #f9a8c9;
    --white:    #ffffff;
    --shadow:   rgba(233,30,99,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--mist);
    color: var(--ink);
    overflow-x: hidden;
    cursor: none;
  }

  /* ═══ CUSTOM CURSOR ═══ */
  #cursor {
    width: 14px; height: 14px;
    background: var(--deep);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease, background 0.2s;
    mix-blend-mode: multiply;
  }
  #cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--rose);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.35s ease, opacity 0.2s;
    opacity: 0.6;
  }

  /* ═══ SCROLLBAR ═══ */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--blush); }
  ::-webkit-scrollbar-thumb { background: var(--rose); border-radius: 4px; }

  /* ═══ SECTIONS ═══ */
  section {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ═══════════════════════════════════════════════════
     SECTION 1 — HERO / INTRO
  ═══════════════════════════════════════════════════ */
  #hero {
    background: var(--soft);
    flex-direction: column;
    text-align: center;
    padding: 60px 20px;
  }

  #hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(244,143,177,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 100%, rgba(248,187,208,0.25) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 10vw, 8.5rem);
    line-height: 0.92;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 0.9s 0.4s forwards;
    position: relative;
    z-index: 1;
  }

  .hero-name em {
    font-style: italic;
    color: var(--deep);
    display: block;
    font-size: 0.6em;
    font-weight: 400;
  }

  .age-badge {
    display: inline-block;
    margin-top: 36px;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 12vw, 9rem);
    font-weight: 600;
    font-style: italic;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--rose);
    opacity: 0;
    animation: fadeUp 1s 0.7s forwards;
    transition: -webkit-text-stroke 0.3s, color 0.3s;
    cursor: default;
  }
  .age-badge:hover {
    color: var(--petal);
    -webkit-text-stroke: 1.5px var(--deep);
  }

  .hero-scroll {
    margin-top: 56px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--rose);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 1.1s forwards;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-scroll::before, .hero-scroll::after {
    content: ''; display: block;
    height: 1px; width: 40px;
    background: var(--rose);
  }

  .petal-bg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; overflow: hidden;
  }
  .petal {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50% 0 50% 0;
    background: var(--petal);
    opacity: 0;
    animation: floatPetal linear infinite forwards;
  }

  /* ═══════════════════════════════════════════════════
     SECTION 2 — PHOTO
  ═══════════════════════════════════════════════════ */
  #photo-section {
    background: var(--blush);
    flex-direction: column;
    padding: 80px 20px;
    gap: 40px;
  }

  .photo-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--deep);
  }

  .photo-frame-outer {
    position: relative;
    width: min(420px, 85vw);
  }

  .photo-frame {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(233,30,99,0.18), 0 4px 16px rgba(233,30,99,0.1);
    transition: transform 0.6s cubic-bezier(.23,1,.32,1);
  }
  .photo-frame:hover { transform: scale(1.02) rotate(0.5deg); }

  .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.9) brightness(1.03);
  }

  .photo-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--petal), var(--blush));
    z-index: -1;
  }

  .photo-corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--deep);
    border-style: solid;
    opacity: 0.5;
  }
  .photo-corner.tl { top: -6px; left: -6px; border-width: 2px 0 0 2px; }
  .photo-corner.tr { top: -6px; right: -6px; border-width: 2px 2px 0 0; }
  .photo-corner.bl { bottom: -6px; left: -6px; border-width: 0 0 2px 2px; }
  .photo-corner.br { bottom: -6px; right: -6px; border-width: 0 2px 2px 0; }

  /* ═══════════════════════════════════════════════════
     SECTION 3 — ENVELOPE
  ═══════════════════════════════════════════════════ */
  #envelope-section {
    background: var(--soft);
    flex-direction: column;
    padding: 80px 20px;
    gap: 16px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-style: italic;
    color: var(--ink);
    margin-bottom: 24px;
  }

  .envelope-wrap { perspective: 900px; cursor: none; }
  .envelope {
    width: min(360px, 85vw); height: 240px;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.23,1,.32,1);
  }
  .envelope.open { transform: rotateX(10deg) scale(0.95); }

  .env-body {
    position: absolute; inset: 0; background: var(--blush);
    border-radius: 4px; box-shadow: 0 12px 48px var(--shadow);
    display: flex; align-items: center; justify-content: center;
  }
  .wax-seal {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f48fb1, #c2185b);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: #fff;
    z-index: 4;
  }
  .env-flap {
    position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background: var(--petal); clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top; transition: transform 0.7s; z-index: 3;
  }
  .envelope.open .env-flap { transform: rotateX(-170deg); }

  .env-letter {
    position: absolute; bottom: 0; left: 10%; right: 10%; height: 85%;
    background: var(--white); transform: translateY(100%);
    transition: transform 0.6s 0.3s; z-index: 1; padding: 20px;
    text-align: center;
  }
  .envelope.open .env-letter { transform: translateY(20%); }

  .messages-grid {
    display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 50px;
    opacity: 0; transition: 1s;
  }
  .messages-grid.visible { opacity: 1; }
  .msg-card { background: #fff; padding: 20px; border-left: 3px solid var(--rose); }

  /* ═══════════════════════════════════════════════════
     ANIMATIONS & NAV
  ═══════════════════════════════════════════════════ */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floatPetal {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(-10vh) translateX(var(--drift)) rotate(360deg); opacity: 0; }
  }

  #nav {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; z-index: 100; background: rgba(255,240,245,0.8);
    backdrop-filter: blur(12px); border-bottom: 1px solid rgba(244,143,177,0.2);
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose);
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav id="nav">
  <span>Moka &amp; Malouka</span>
  <div style="display: flex; gap: 20px;">
    <a href="#hero" style="text-decoration:none; color:inherit;">Home</a>
    <a href="#photo-section" style="text-decoration:none; color:inherit;">Photo</a>
    <a href="#envelope-section" style="text-decoration:none; color:inherit;">Message</a>
  </div>
</nav>

<section id="hero">
  <div class="petal-bg" id="petalBg"></div>
  <p class="hero-tag">17 — a milestone, compiled</p>
  <h1 class="hero-name">Moka <em>&amp; Malouka</em></h1>
  <div class="age-badge">17</div>
  <p class="hero-scroll">scroll to explore</p>
</section>

<section id="photo-section">
  <p class="photo-label">// captured.moment</p>
  <div class="photo-frame-outer">
    <div class="photo-frame">
      <img src="moka.jpg" alt="Moka" onerror="this.style.display='none';">
      <div class="photo-placeholder">
        <span style="font-size: 3rem; color: var(--deep);">✿</span>
        <p style="font-size: 0.7rem; color: var(--deep); margin-top: 10px;">Place "moka.jpg" in folder</p>
      </div>
      <div class="photo-corner tl"></div>
      <div class="photo-corner tr"></div>
      <div class="photo-corner bl"></div>
      <div class="photo-corner br"></div>
    </div>
  </div>
</section>

<section id="envelope-section">
  <h2 class="section-title">A Digital Letter</h2>
  <div class="envelope-wrap" onclick="openEnvelope()">
    <div class="envelope" id="envelope">
      <div class="env-flap"></div>
      <div class="env-body">
        <div class="wax-seal">M</div>
      </div>
      <div class="env-letter">
        <p style="font-family: 'Playfair Display'; font-style: italic; color: var(--deep);">To Malouka,</p>
        <p style="font-size: 0.8rem; margin-top: 10px;">Happy 17th Birthday! May your code always run without errors.</p>
      </div>
    </div>
  </div>
  <div class="messages-grid" id="msgGrid">
    <div class="msg-card">Keep shining and coding your dreams.</div>
  </div>
</section>

<script>
  // 1. Cursor Logic
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    ring.style.left = e.clientX + 'px';
    ring.style.top = e.clientY + 'px';
  });

  // 2. Petals
  const petalBg = document.getElementById('petalBg');
  function createPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
    p.style.animationDuration = (Math.random() * 3 + 4) + 's';
    petalBg.appendChild(p);
    setTimeout(() => p.remove(), 7000);
  }
  setInterval(createPetal, 400);

  // 3. Envelope
  function openEnvelope() {
    document.getElementById('envelope').classList.toggle('open');
    document.getElementById('msgGrid').classList.add('visible');
  }
</script>

</body>
</html>
