<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOKA 17 | FINAL VERSION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <style>
        :root { --p: #ff4d6d; --s: #ffb3c1; --d: #000; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background: #fff5f7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .grid { 
            position: fixed; inset: 0; 
            background-image: radial-gradient(var(--s) 1.5px, transparent 1.5px); 
            background-size: 30px 30px; opacity: 0.3; z-index: -1; 
        }

        /* حاوية التوسيط المطلق */
        .container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }

        .stage { display: none; width: 100%; flex-direction: column; align-items: center; }
        .stage.active { display: flex; }

        /* كارت البروفايل */
        .card { 
            background: #fff; border: 4px solid var(--d); 
            padding: 40px 20px; border-radius: 25px; 
            box-shadow: 12px 12px 0px var(--d); 
            width: 85%; max-width: 320px; text-align: center; position: relative;
        }

        .photo-frame {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--d); margin: -100px auto 20px;
            background: var(--s); overflow: hidden; box-shadow: 5px 5px 0px var(--d);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .btn { 
            width: 100%; padding: 16px; margin-top: 15px; 
            background: #fff; border: 3px solid var(--d); 
            border-radius: 15px; font-weight: 900; 
            box-shadow: 6px 6px 0px var(--d); cursor: pointer;
            transition: 0.1s; font-size: 16px;
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--d); }

        /* مشهد الظرف والورق */
        .env-box { 
            width: 300px; height: 180px; background: #fff; 
            border: 4px solid var(--d); position: relative; 
            box-shadow: 10px 10px 0px var(--d); 
        }
        .paper { 
            width: 90%; height: 150px; background: #fff9c4; 
            border: 3px solid var(--d); position: absolute; 
            top: 10px; left: 5%; cursor: grab; padding: 15px; 
            box-sizing: border-box; text-align: right;
        }

        #cinema-overlay { 
            position: fixed; inset: 0; background: var(--d); 
            z-index: 2000; display: none; align-items: center; justify-content: center;
            color: white; font-size: 35px; font-weight: 900; text-align: center;
        }

        .back-nav { position: fixed; top: 20px; left: 20px; background: var(--d); color: #fff; padding: 10px 20px; border-radius: 30px; border: none; cursor: pointer; display: none; z-index: 100; }
    </style>
</head>
<body>

<div class="grid"></div>
<button class="back-nav" id="backHome" onclick="location.reload()">HOME</button>

<div class="container">
    <div class="stage active" id="home">
        <div class="card">
            <div class="photo-frame">
                <img src="Malouka.jpg" alt="Moka">
            </div>
            <h1 style="margin:0; color:var(--p); -webkit-text-stroke: 1px #000; font-size: 32px;">MOKA 17</h1>
            <button class="btn" style="background:var(--p); color:#fff;" onclick="startCinema()">▶ PLAY FILM</button>
            <button class="btn" onclick="showStage('letters')">✉ READ LETTERS</button>
        </div>
    </div>

    <div class="stage" id="letters">
        <div class="env-box">
            <div class="paper" id="p2" style="z-index:1; background:#fdf2f2;">
                <h3>الرسالة الثانية</h3>
                <p>17 سنة من السعادة يا ملوكة ❤️</p>
            </div>
            <div class="paper" id="p1" style="z-index:2;">
                <h3>الرسالة الأولى</h3>
                <p>شدي الورقة دي لفوق بصباعك..</p>
            </div>
        </div>
        <p style="color:var(--p); font-weight:bold; margin-top:20px;">↑ اسحبي الورق للأعلى ↑</p>
    </div>
</div>

<div id="cinema-overlay">
    <div id="film-text">3...</div>
</div>

<script>
    gsap.registerPlugin(Draggable);

    function showStage(id) {
        document.getElementById('backHome').style.display = 'block';
        document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'letters') initDraggable();
    }

    function startCinema() {
        const overlay = document.getElementById('cinema-overlay');
        const fText = document.getElementById('film-text');
        overlay.style.display = 'flex';
        
        const tl = gsap.timeline();
        tl.to(fText, { textContent: "2...", duration: 1 })
          .to(fText, { textContent: "1...", duration: 1 })
          .to(fText, { textContent: "HAPPY BIRTHDAY MOKA!", scale: 1.2, color: "#ff4d6d", duration: 1.5 })
          .to(overlay, { opacity: 0, duration: 1, onComplete: () => {
              overlay.style.display = 'none';
              document.getElementById('backHome').style.display = 'block';
          }});
    }

    function initDraggable() {
        Draggable.create(".paper", {
            type: "y",
            bounds: { minY: -500, maxY: 0 },
            onDragEnd: function() {
                if(this.y < -120) {
                    gsap.to(this.target, { y: -600, rotation: 10, duration: 0.6 });
                } else {
                    gsap.to(this.target, { y: 0, duration: 0.4, ease: "back.out(2)" });
                }
            }
        });
    }
</script>
</body>
</html>
